<!DOCTYPE html>
<html>
<head>
    <title>My To-Do List</title>
</head>
<body>

<h1>My To-Do List</h1>

<!-- Form to add new tasks -->
<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter task" required>
    <button type="submit">Add</button>
</form>

<!-- Task list -->
<ul>
{% for task in tasks %}
    <li>
        <!-- Toggle completion -->
        <form action="/toggle/{{ task.id }}/" method="POST" style="display:inline;">
            {% csrf_token %}
            <input type="checkbox" onchange="this.form.submit()" {% if task.completed %}checked{% endif %}>
        </form>

        <!-- Task title -->
        {% if task.completed %}
            <s>{{ task.title }}</s>
        {% else %}
            {{ task.title }}
        {% endif %}

        <!-- Delete link -->
        <a href="/delete/{{ task.id }}/">Delete</a>
    </li>
{% endfor %}
</ul>

<!-- API Calculation Link -->
<a href="/api/calculate/">Calculate Tasks</a>
<!-- Placeholder for API result -->
<p id="result"></p>




</body>
</html>
